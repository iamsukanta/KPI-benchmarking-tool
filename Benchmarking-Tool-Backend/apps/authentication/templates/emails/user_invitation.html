<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body { font-family: "Source Sans 3", Arial, Helvetica, sans-serif; background: #f4f4f4; padding: 20px; }

        .logo {

            display: block;
            width: fit-content;
            margin: 30px auto;
        }

<body>
    <div class="container">
        <img src="{{ logo_link }}" alt="Himmlische Herbergen" class="logo">
        <h1>Hallo 👋</h1>

        <p><a href="{{ invitation_link }}" class="btn">Einladung annehmen</a></p>

        <hr>
        <small>Wenn Sie diese E-Mail nicht annehmen möchten, ignorieren Sie sie bitte..</small>
    </div>
</body>
</html>
