<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Source Sans 3", Arial, Helvetica, sans-serif; background: #f4f4f4; padding: 20px; }

            padding: 12px 24px;

            display: block;
            width: fit-content;
            margin: 30px auto;
        }

<body>
    <div class="container">
        <h1>Neue Aktivität!</h1>

        <h3>{{ facility_name }}</h3>

        <p><a href="{{ administration_link }}" class="btn">Verwalten</a></p>
    </div>
</body>
</html>
